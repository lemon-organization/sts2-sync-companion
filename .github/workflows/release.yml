name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'STS2 Sync ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform from the assets below.

            **First launch (unsigned app):**
            - **Windows:** If SmartScreen blocks it, click "More info" → "Run anyway"
            - **macOS:** Right-click the app → Open → Open (to bypass Gatekeeper on first launch)

            See the [README](https://github.com/lemon-organization/sts2-sync-companion#readme) for full setup instructions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
